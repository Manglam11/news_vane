services:
  db:
    image: postgres:16
    container_name: newsvane-db
    environment:
      POSTGRES_USER: newsvane
      POSTGRES_PASSWORD: newsvane
      POSTGRES_DB: newsvane
    ports:
      - "5433:5432"
    volumes:
      - newsvane_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsvane -d newsvane"]
      interval: 5s
      timeout: 3s
      retries: 5

  test-db:
    image: postgres:16
    environment:
      POSTGRES_USER: newsvane
      POSTGRES_PASSWORD: newsvane
      POSTGRES_DB: newsvane_test
    ports:
      - "5434:5432"
    # No named volume on purpose -- this database is disposable by design.
    # Its entire contents should die with the container.

  app:
    build: .
    container_name: newsvane-api
    ports:
      - "8000:8000"
    environment:
      # Inside the compose network the database answers to its service name on its
      # own port. My .env still points at localhost:5433 for running the API straight
      # from PyCharm, and this line overrides it only for the containerised run.
      DATABASE_URL: postgresql+psycopg://newsvane:newsvane@db:5432/newsvane
    depends_on:
      db:
        condition: service_healthy
    # No command override. The image's own CMD migrates then serves, and that is the
    # exact line a managed host will run -- so the local run rehearses the real one
    # instead of quietly testing a different startup path.

volumes:
  newsvane_pgdata: